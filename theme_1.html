<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>web-flipclock</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Grotesk:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <style>
        :root {
            --bg-base: #1a1a1a;
            --bg-gradient: #242424;
            --card-bg: #111111;
            --text-primary: #e5e5e5;
            --accent-gold: #c5a059;
            --date-color: #888888;
        }

        body {
            background-color: var(--bg-base);
            background: radial-gradient(circle at center, var(--bg-gradient) 0%, var(--bg-base) 100%);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .settings-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            text-align: right;
        }

        #gear-icon {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            opacity: 0.4;
            transition: transform 0.3s, opacity 0.3s;
        }

        #gear-icon:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        .theme-menu {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 8px;
            display: none; /* Hidden by default */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .theme-menu span {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        .theme-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 4px;
            transition: background 0.2s;
            white-space: nowrap;
            text-align: left;
        }

        .theme-menu a:hover {
            background: rgba(197, 160, 89, 0.2); /* Subtle gold hover */
        }

        .date-display {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--date-color);
            margin-bottom: 60px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            padding-bottom: 10px;
        }

        .clock-wrapper {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .flip-clock-wrapper ul li a div div.inn {
            background-color: var(--card-bg) !important;
            color: var(--accent-gold) !important;
            border-radius: 6px !important;
            font-size: 60px !important;
        }

        .flip-clock-wrapper ul {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
            border-radius: 6px !important;
        }

        .flip-clock-divider .flip-clock-label {
            color: var(--date-color) !important;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
            bottom: -2em !important;
        }

        .flip-clock-dot {
            background: var(--accent-gold) !important;
            box-shadow: none !important;
        }

        #scaler {
            position: fixed;
            bottom: 40px;
            width: 150px;
            accent-color: var(--accent-gold);
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        #scaler:hover { opacity: 1; }

        .footer {
            position: fixed;
            bottom: 15px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="settings-container">
        <i id="gear-icon" class="fas fa-cog"></i>
        <div id="menu" class="theme-menu">
            <span>Switch Theme</span>
            <a href="home.html">Default Dark</a>
            <a href="theme_2.html">Obsidian Glass</a>
            <a href="theme_3.html">Gallery Walnut</a>
        </div>
    </div>
    
    <div id="date" class="date-display"></div>

    <div class="clock-wrapper">
        <div class="clock"></div>
    </div>

    <input id="scaler" type="range" min="0.5" max="2.5" step="0.1">

    <div class="footer">
        Studio Edition
    </div>

    <script>
        var clock;

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            $('#date').text(now.toLocaleDateString('en-US', options).toUpperCase());
        }

        $(document).ready(function () {
            clock = $('.clock').FlipClock({
                clockFace: 'TwentyFourHourClock',
                showSeconds: true
            });

            updateDate();
            setInterval(updateDate, 60000);

            $('#gear-icon').click(function() {
                $('#menu').fadeToggle(200);
            });

            $(document).click(function(event) { 
                if(!$(event.target).closest('.settings-container').length) {
                    if($('#menu').is(":visible")) {
                        $('#menu').fadeOut(200);
                    }
                }        
            });

            $(document).on('dblclick', function () {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });

            function applyScale() {
                var scale = $('#scaler').val();
                $('.clock-wrapper').css('transform', 'scale(' + scale + ')');
            }

            function autoAdjust() {
                var width = $(window).width();
                var scaleVal = (width < 600) ? (width / 500) : 1.5;
                $('#scaler').val(scaleVal);
                applyScale();
            }

            $('#scaler').on('input', applyScale);
            $(window).resize(autoAdjust);
            autoAdjust();
        });
    </script>
</body>
</html>
