<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Gallery Walnut Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@200;600&family=Public+Sans:wght@100;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <style>
        :root {
            --wood-dark: #1a1512;
            --paper-warm: #f4f1ea;
            --ink-charcoal: #2a2a2a;
            --accent-burnt: #8c4a32;
        }

        body {
            background-color: var(--wood-dark);
            background-image: url("https://www.transparenttextures.com/patterns/dark-wood.png");
            color: var(--paper-warm);
            font-family: 'Public Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .settings-container {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
        }
        #gear-icon {
            font-size: 22px;
            cursor: pointer;
            color: var(--paper-warm);
            opacity: 0.15;
            transition: 0.3s;
        }
        #gear-icon:hover { opacity: 0.7; transform: rotate(90deg); }

        .theme-menu {
            position: absolute;
            right: 0;
            margin-top: 15px;
            background: #251f1c;
            padding: 15px;
            border-radius: 4px;
            display: none; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(244, 241, 234, 0.05);
            min-width: 150px;
        }
        .theme-menu a {
            display: block;
            color: var(--paper-warm);
            text-decoration: none;
            padding: 10px;
            font-size: 13px;
            opacity: 0.7;
            text-align: left;
        }
        .theme-menu a:hover { opacity: 1; background: rgba(140, 74, 50, 0.2); }

        .date-display {
            font-weight: 100;
            font-size: 0.9rem;
            letter-spacing: 0.6rem;
            text-transform: uppercase;
            color: rgba(244, 241, 234, 0.4);
            margin-bottom: 60px;
            border-top: 1px solid rgba(244, 241, 234, 0.1);
            padding-top: 20px;
            text-align: center;
        }

        .clock-wrapper {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.6));
            display: flex;
            justify-content: center;
        }

        .flip-clock-wrapper {
            margin: 0 !important;
            display: flex !important;
            align-items: center;
        }

        .flip-clock-wrapper ul {
            width: 80px !important;
            height: 120px !important;
            margin: 4px !important;
            background: var(--paper-warm) !important;
            border-radius: 4px !important;
        }

        .flip-clock-wrapper ul li a div div.inn::after {
            display: none !important;
        }

        .flip-clock-wrapper ul li a div.up::after {
            content: "";
            position: absolute;
            top: 59px; 
            left: 0;
            z-index: 15;
            width: 100%;
            height: 1px;
            background-color: rgba(42, 42, 42, 0.12) !important;
            box-shadow: 0 1px 1px rgba(255, 255, 255, 0.3); /* Subtle highlight for paper texture */
        }

        .flip-clock-wrapper ul li a div div.inn {
            background-color: var(--paper-warm) !important;
            color: var(--ink-charcoal) !important;
            font-family: 'Crimson Pro', serif !important;
            font-weight: 600 !important;
            font-size: 90px !important;
            text-shadow: none !important;
            line-height: 120px !important; 
        }

        .flip-clock-dot {
            background: var(--accent-burnt) !important;
            box-shadow: none !important;
            width: 6px !important;
            height: 6px !important;
        }

        .flip-clock-divider .flip-clock-label {
            font-family: 'Public Sans', sans-serif;
            text-transform: uppercase;
            font-size: 8px;
            letter-spacing: 2px;
            color: rgba(244, 241, 234, 0.2) !important;
            bottom: -45px !important;
            right: -106px !important;
        }

        #scaler {
            position: fixed;
            bottom: 40px;
            accent-color: var(--accent-burnt);
            opacity: 0.1;
            transition: 0.3s;
        }
        #scaler:hover { opacity: 0.8; }

        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 8px;
            letter-spacing: 4px;
            opacity: 0.2;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="settings-container">
        <i id="gear-icon" class="fas fa-cog"></i>
        <div id="menu" class="theme-menu">
            <a href="home.html">Default Dark</a>
            <a href="theme_1.html">Studio Edition</a>
            <a href="theme_2.html">Obsidian Glass</a>
        </div>
    </div>

    <div id="date" class="date-display"></div>

    <div class="clock-wrapper">
        <div class="clock"></div>
    </div>

    <input id="scaler" type="range" min="0.5" max="2.5" step="0.1">

    <div class="footer">Gallery Walnut</div>

    <script>
        var clock;
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            $('#date').text(now.toLocaleDateString('en-US', options));
        }

        $(document).ready(function () {
            clock = $('.clock').FlipClock({
                clockFace: 'TwentyFourHourClock',
                showSeconds: true
            });

            updateDate();
            setInterval(updateDate, 60000);

            $('#gear-icon').click(function() { $('#menu').fadeToggle(200); });
            $(document).click(function(e) {
                if(!$(e.target).closest('.settings-container').length) { $('#menu').fadeOut(200); }
            });

            function applyScale() {
                $('.clock-wrapper').css('transform', 'scale(' + $('#scaler').val() + ')');
            }

            function autoAdjust() {
                var width = $(window).width();
                var scaleVal = (width < 600) ? (width / 550) : 1.2;
                $('#scaler').val(scaleVal);
                applyScale();
            }

            $('#scaler').on('input', applyScale);
            $(window).resize(autoAdjust);
            autoAdjust();
        });
    </script>
</body>
</html>
