<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>web-flipclock</title>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <style>
        :root {
            --paper-base: #fdfcf8;
            --ink-black: #1a1a1a;
            --ink-muted: #888888;
            --accent-red: #a33b32;
        }

        body {
            background-color: var(--paper-base);
            background-image: 
                radial-gradient(circle, transparent 20%, rgba(0,0,0,0.03) 100%),
                url("https://www.transparenttextures.com/patterns/natural-paper.png");
            color: var(--ink-black);
            font-family: 'Libre Baskerville', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .settings-container {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
            text-align: right;
        }

        #gear-icon {
            font-size: 20px;
            cursor: pointer;
            color: var(--ink-black);
            opacity: 0.2;
            transition: transform 0.4s ease, opacity 0.3s;
        }

        #gear-icon:hover {
            opacity: 0.8;
            transform: rotate(90deg);
        }

        .theme-menu {
            margin-top: 15px;
            background: white;
            padding: 12px;
            border-radius: 4px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .theme-menu span {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--ink-muted);
            text-align: left;
            padding-left: 10px;
        }

        .theme-menu a {
            display: block;
            color: var(--ink-black);
            text-decoration: none;
            padding: 8px 20px;
            font-size: 13px;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
            text-align: left;
            border-radius: 2px;
        }

        .theme-menu a:hover {
            background: var(--paper-base);
            color: var(--accent-red);
        }

        .date-display {
            font-style: italic;
            font-size: 1.4rem;
            color: var(--ink-black);
            margin-bottom: 60px;
            position: relative;
            animation: fadeIn 2s ease-out;
            letter-spacing: -0.02em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .date-display::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 1px;
            background: var(--accent-red);
            opacity: 0.6;
        }

        .clock-wrapper {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 25px 50px rgba(0,0,0,0.12));
        }

        .flip-clock-wrapper ul li a div div.inn {
            background-color: var(--ink-black) !important;
            color: var(--paper-base) !important;
            border-radius: 5px !important;
            font-family: 'Playfair Display', serif !important;
            font-size: 70px !important;
        }

        .flip-clock-wrapper ul li a div div.inn::after {
            background-color: rgba(255,255,255,0.03) !important;
            height: 1px !important;
        }

        .flip-clock-dot {
            background: var(--accent-red) !important;
            box-shadow: none !important;
            width: 7px !important;
            height: 7px !important;
        }

        .flip-clock-divider .flip-clock-label {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--ink-muted) !important;
            bottom: -4em !important;
        }

        #scaler {
            position: fixed;
            bottom: 50px;
            width: 140px;
            accent-color: var(--accent-red);
            opacity: 0;
            transition: opacity 0.4s;
            cursor: ew-resize;
        }
        body:hover #scaler { opacity: 0.3; }
        #scaler:hover { opacity: 1; }

        .footer {
            position: fixed;
            bottom: 25px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--ink-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="settings-container">
        <i id="gear-icon" class="fas fa-cog"></i>
        <div id="menu" class="theme-menu">
            <span>Themes</span>
            <a href="home.html">Default Dark</a>
            <a href="theme_1.html">Studio Edition</a>
            <a href="theme_3.html">Gallery Walnut</a>
        </div>
    </div>

    <div id="date" class="date-display"></div>

    <div class="clock-wrapper">
        <div class="clock"></div>
    </div>

    <input id="scaler" type="range" min="0.5" max="2.5" step="0.1">

    <div class="footer">
        Obsidian Glass
    </div>

    <script>
        var clock;

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            $('#date').text(now.toLocaleDateString('en-US', options));
        }

        $(document).ready(function () {
            clock = $('.clock').FlipClock({
                clockFace: 'TwentyFourHourClock',
                showSeconds: true
            });

            updateDate();
            setInterval(updateDate, 60000);

            $('#gear-icon').click(function() {
                $('#menu').fadeToggle(200);
            });

            $(document).click(function(e) {
                if(!$(e.target).closest('.settings-container').length) {
                    $('#menu').fadeOut(200);
                }
            });

            $(document).on('dblclick', function () {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });

            function applyScale() {
                var val = $('#scaler').val();
                $('.clock-wrapper').css('transform', 'scale(' + val + ')');
            }

            function autoAdjust() {
                var width = $(window).width();
                var scaleVal = (width < 600) ? (width / 480) : 1.5;
                $('#scaler').val(scaleVal);
                applyScale();
            }

            $('#scaler').on('input', applyScale);
            $(window).resize(autoAdjust);
            autoAdjust();
        });
    </script>
</body>
</html>
